name: Lighthouse

# Performance is measured against a production build, so it's kept off the
# per-PR path: run manually or weekly. Budgets are warn-only (see lighthouserc.cjs).
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

concurrency:
  group: lighthouse
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI (prod build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium (Lighthouse uses it via CHROME_PATH)
        run: npx playwright install --with-deps chromium

      - name: Write .env.test from secrets
        id: prep
        env:
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$TEST_SUPABASE_URL" ]; then
            echo "::warning::TEST_SUPABASE_URL not configured — skipping Lighthouse."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$TEST_SUPABASE_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$TEST_SUPABASE_ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$TEST_SUPABASE_SERVICE_ROLE_KEY"
            echo "NEXT_PUBLIC_APP_URL=http://localhost:3200"
            echo "ALLOW_REAL_SUPABASE_IN_TESTS=true"
          } > .env.test

      - name: Lighthouse CI
        if: ${{ steps.prep.outputs.skip != 'true' }}
        run: npm run test:perf

      - name: Upload Lighthouse report
        if: ${{ always() && steps.prep.outputs.skip != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-report/
          retention-days: 14
